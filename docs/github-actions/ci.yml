name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: CLI smoke
        run: k8s-log-triage examples/crashloop_logs.json --service embedding-api --environment ci --fail-at 90
      - name: Docker build
        run: docker build -t k8s-log-anomaly-triage-service:ci .
