apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-log-anomaly-triage
  labels:
    app: k8s-log-anomaly-triage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-log-anomaly-triage
  template:
    metadata:
      labels:
        app: k8s-log-anomaly-triage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: ghcr.io/nagadeepak1998/k8s-log-anomaly-triage-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
